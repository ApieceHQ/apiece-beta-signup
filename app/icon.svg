<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Apiece">
  <!-- Simplified "The 45" mark for small sizes: groove rings dropped for favicon clarity, per logo handoff -->
  <defs>
    <mask id="apiece-favicon-hole">
      <rect width="100" height="100" fill="white" />
      <circle cx="50" cy="50" r="10" fill="black" />
    </mask>
  </defs>
  <g mask="url(#apiece-favicon-hole)">
    <circle cx="50" cy="50" r="46" fill="#1a1a1a" />
    <circle cx="50" cy="50" r="28" fill="#23324f" />
  </g>
  <circle cx="50" cy="50" r="10" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.5" />
</svg>
